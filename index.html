<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BUMPER TANKS — VOID SUMO</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5' fill='%23131734' stroke='%2326e6ff' stroke-width='2.5'/%3E%3Crect x='15' y='2' width='9' height='4' rx='2' fill='%2326e6ff' transform='rotate(30 16 16)'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <script src="vendor/qrcode.js"></script>
  <script src="vendor/peerjs.min.js"></script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <!-- MAIN MENU (attract mode plays behind it) -->
    <section id="screen-menu" class="screen">
      <div class="wordmark">BUMPER<br><em>TANKS</em></div>
      <div class="sub">void sumo &middot; one finger &middot; no brakes</div>
      <div class="menu-buttons">
        <button id="btn-host" class="btn primary">Host arena</button>
        <button id="btn-join" class="btn">Join with code</button>
        <button id="btn-playground" class="btn">Playground</button>
      </div>
      <div class="hint">tap anywhere to aim and fire &mdash; recoil is how you move. fall off and you're out.</div>
    </section>

    <!-- LOBBY -->
    <section id="screen-lobby" class="screen hidden">
      <div class="panel">
        <div>
          <div class="label">arena code</div>
          <div id="lobby-code" class="lobby-code">·····</div>
        </div>
        <div class="qr-wrap"><img id="qr-img" alt="Scan to join this arena"></div>
        <div class="status" id="lobby-status">opening lobby&hellip;</div>
        <div>
          <div class="label">pilots</div>
          <div id="lobby-roster" class="roster"></div>
        </div>
        <input id="name-input" class="field" maxlength="10" placeholder="YOUR CALLSIGN" autocomplete="off">
        <div id="host-controls">
          <div class="label" style="margin-bottom:6px">mode</div>
          <div class="seg" id="mode-seg">
            <button class="btn small on" data-mode="rumble">Rumble 2:00</button>
            <button class="btn small" data-mode="lts">Last standing</button>
          </div>
          <div class="label" style="margin:12px 0 6px">arena</div>
          <div class="seg" id="map-seg">
            <button class="btn small on" data-map="random">Random</button>
          </div>
          <div class="row" style="margin-top:14px">
            <button id="btn-add-bot" class="btn small">+ Bot</button>
            <button id="btn-start" class="btn small primary">Launch</button>
          </div>
        </div>
        <div id="guest-wait" class="status hidden">waiting for host to launch&hellip;</div>
        <button id="btn-leave-lobby" class="btn small">Leave</button>
      </div>
    </section>

    <!-- JOIN -->
    <section id="screen-join" class="screen hidden">
      <div class="panel">
        <div class="title">Join arena</div>
        <input id="join-code" class="field" maxlength="5" placeholder="CODE" autocomplete="off" autocapitalize="characters">
        <div class="status" id="join-status"></div>
        <button id="btn-connect" class="btn primary">Connect</button>
        <button id="btn-join-back" class="btn small">Back</button>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="screen-results" class="screen hidden">
      <div class="panel">
        <div class="title" id="results-title">Match over</div>
        <div id="results-list" class="results-list"></div>
        <div class="row">
          <button id="btn-rematch" class="btn small primary">Rematch</button>
          <button id="btn-results-leave" class="btn small">Exit</button>
        </div>
        <div id="results-wait" class="status hidden">waiting for host&hellip;</div>
      </div>
    </section>

    <!-- IN-GAME HUD -->
    <div id="hud" class="hidden">
      <div id="hud-mode"></div>
      <div class="hud-top"><div id="hud-timer"></div></div>
      <div id="scores"></div>
      <div id="killfeed"></div>
      <div id="center-msg"></div>
      <div id="playground-bar" class="hidden">
        <button id="pg-add-bot" class="icon-btn">+ bot</button>
        <button id="pg-remove-bot" class="icon-btn">&minus; bot</button>
        <button id="pg-map" class="icon-btn">next arena</button>
        <button id="pg-reset" class="icon-btn">reset</button>
      </div>
      <div class="hud-corner left">
        <button id="btn-quit" class="icon-btn">exit</button>
      </div>
      <div class="hud-corner right">
        <button id="btn-mute" class="icon-btn">sound on</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
